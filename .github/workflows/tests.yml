name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv run --extra dev ruff format --check src
      - run: uv run --extra dev ruff check src
      - run: uv run --extra dev ty check src
      - run: uv run --extra dev pytest --cov=tiqs --cov-fail-under=95
